<?xml version="1.0" encoding="UTF-8"?>
<!--
  Medium brand thumbnail — recreates the "black background + tonal letterforms
  + white serif wordmark" look from Medium's brand poster.
  16:10 aspect ratio fills the .card-media area cleanly.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <!-- Black canvas -->
  <rect width="1600" height="1000" fill="#0a0a0a"/>

  <!-- Tonal background letterforms (very dark gray, only just visible against the black) -->
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#1d1d1d">
    <text x="-60"   y="920"  font-size="1300">M</text>
    <text x="1200"  y="950"  font-size="1100">m</text>
    <text x="200"   y="350"  font-size="700"  opacity="0.85">u</text>
    <text x="1050"  y="350"  font-size="700"  opacity="0.85">d</text>
    <text x="640"   y="980"  font-size="650"  opacity="0.7">i</text>
  </g>

  <!-- Foreground wordmark — white serif italic-feel "Medium" -->
  <text x="800" y="510"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="300" font-weight="700"
        fill="#ffffff"
        text-anchor="middle"
        dominant-baseline="central">Medium</text>
</svg>
