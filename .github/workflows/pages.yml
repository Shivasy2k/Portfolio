# Deploy this static site to GitHub Pages on every push to main.
# Repo: Shivasy2k/Portfolio
# After this workflow runs once, your site is live at:
#   https://shivasy2k.github.io/Portfolio/
#
# One-time setup in GitHub:
#   Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"

name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the repo root as-is — pure static site, no build step needed.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
