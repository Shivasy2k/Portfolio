# Deploy this static site to GitHub Pages on every push to main.
# Repo: Shivasy2k/Portfolio
# Site URL: https://shivasy2k.github.io/Portfolio/
#
# One-time setup in GitHub (browser):
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
#
# Pipeline:
#   1. Check out the repo
#   2. Run `node scripts/build.js` — reads /content, writes /data
#   3. Upload the whole repo as a Pages artifact
#   4. Deploy

name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build site data from /content
        run: node scripts/build.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the repo root (with freshly generated /data).
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
